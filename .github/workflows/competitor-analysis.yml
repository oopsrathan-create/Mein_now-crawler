name: competitor analysis crawl

# Pulls the competitor field on its own — discovers every Anbieter, crawls the
# focus competitors' full catalogues + the market SERP table. Kept separate from
# the daily crawl so it isn't blocked by the (slow) inventory/keyword steps.

on:
  workflow_dispatch: {}
  schedule:
    # 06:30 UTC every Monday (after the weekly report).
    - cron: "30 6 * * 1"

permissions:
  contents: write

concurrency:
  group: mein-now-data-commit
  cancel-in-progress: false

jobs:
  competitors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r meinnow_crawler/requirements.txt

      - name: Run competitor analysis
        run: python meinnow_crawler/competitor_analysis.py

      - name: Commit data
        run: |
          git config user.name "course-crawler[bot]"
          git config user.email "actions@github.com"
          git add meinnow_crawler/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: competitor analysis $(date -u +%Y-%m-%d)"
            pushed=false
            for i in 1 2 3 4 5; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin main && git push; then pushed=true; break; fi
              echo "push attempt $i failed, retrying"; sleep 7
            done
            if [ "$pushed" != true ]; then echo "::error::could not push data after retries"; exit 1; fi
          fi
