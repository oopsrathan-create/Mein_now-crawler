name: mein-now course crawl

on:
  schedule:
    # 05:15 UTC daily (~06:15/07:15 Germany). Cron uses UTC.
    - cron: "15 5 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write   # needed to commit the new data snapshots back to the repo

# Serialize every workflow that commits to data/ so two crawls never push at
# once (that caused rebase conflicts and lost data). Shared group across
# crawl.yml, competitor-analysis.yml and weekly-rankings.yml.
concurrency:
  group: mein-now-data-commit
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r meinnow_crawler/requirements.txt

      - name: Run inventory crawler
        run: python meinnow_crawler/crawl.py

      - name: Run keyword tracker
        run: python meinnow_crawler/keyword_tracker.py

      - name: Run competitor share snapshot
        run: python meinnow_crawler/competitor_share.py

      # Competitor analysis runs in its own workflow (competitor-analysis.yml),
      # not here — keeps the daily crawl fast and avoids doing it twice.

      - name: Commit data
        run: |
          git config user.name "course-crawler[bot]"
          git config user.email "actions@github.com"
          git add meinnow_crawler/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: crawl snapshot $(date -u +%Y-%m-%d)"
            pushed=false
            for i in 1 2 3 4 5; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin main && git push; then pushed=true; break; fi
              echo "push attempt $i failed, retrying"; sleep 7
            done
            if [ "$pushed" != true ]; then echo "::error::could not push data after retries"; exit 1; fi
          fi
